<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Poppins;
}

.login-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="login-box">

<h2 class="text-center mb-4">
Login
</h2>

<form action="/" method="GET">

<div class="mb-3">

<label>Email</label>

<input type="email"
class="form-control"
placeholder="Enter email">

</div>

<div class="mb-3">

<label>Password</label>

<input type="password"
class="form-control"
placeholder="Enter password">

</div>

<button class="btn btn-primary w-100">
Login
</button>

<p class="text-center mt-3">

Don't have an account?

<a href="signup.html">
Signup
</a>

</p>

</form>

</div>

</body>
</html>
